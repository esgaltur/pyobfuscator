name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set UTF-8 encoding (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
        echo "PYTHONUTF8=1" >> $env:GITHUB_ENV
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install cryptography
        pip install -e .

    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=pyobfuscate --cov-report=xml || python examples/tests.py

    - name: Test CLI
      run: |
        pyobfuscate --help
        echo "print('hello')" > test_input.py
        pyobfuscate -i test_input.py -o test_output.py
        python test_output.py

    - name: Test import
      run: |
        python -c "from pyobfuscate import Obfuscator, RuntimeProtector; print('Import OK')"

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linters
      run: |
        pip install flake8 black isort

    - name: Check formatting with black
      run: |
        black --check --diff pyobfuscate/ || true

    - name: Check imports with isort
      run: |
        isort --check-only --diff pyobfuscate/ || true

    - name: Lint with flake8
      run: |
        flake8 pyobfuscate/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 pyobfuscate/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install security scanner
      run: pip install bandit safety

    - name: Run bandit security scan
      run: |
        bandit -r pyobfuscate/ -ll || true

    - name: Check dependencies for vulnerabilities
      run: |
        pip install cryptography
        safety check || true
